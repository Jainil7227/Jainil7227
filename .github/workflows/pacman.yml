name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Crop the extra empty row from SVG
        run: |
          python3 << 'PYEOF'
          import re

          with open("dist/github-contribution-grid-snake-dark.svg", "r") as f:
              content = f.read()

          # Find the current viewBox values
          vb_match = re.search(r'viewBox="([^"]+)"', content)
          if vb_match:
              parts = vb_match.group(1).split()
              if len(parts) == 4:
                  x, y, w, h = parts
                  # Each row is 13px tall — remove the last empty row (13px)
                  new_h = str(int(float(h)) - 13)
                  # Also update height attribute
                  content = re.sub(r'viewBox="[^"]+"', f'viewBox="{x} {y} {w} {new_h}"', content)
                  content = re.sub(r'(?<=<svg[^>]{0,200})height="[^"]+"', f'height="{new_h}"', content)

          with open("dist/github-contribution-grid-snake-dark.svg", "w") as f:
              f.write(content)

          print(f"Done! New height: {new_h}")
          PYEOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

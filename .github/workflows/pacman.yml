name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            /tmp/snake-raw.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix viewBox and copy to dist
        run: |
          mkdir -p dist
          sed 's/viewBox="-16 -32 880 192"/viewBox="-16 0 880 160"/g; s/height="192"/height="160"/g' \
            /tmp/snake-raw.svg > dist/github-contribution-grid-snake-dark.svg
          echo "Done! Fixed SVG written to dist."

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

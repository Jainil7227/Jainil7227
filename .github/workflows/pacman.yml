name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix viewBox — remove invisible top row
        run: |
          cp dist/github-contribution-grid-snake-dark.svg dist/snake-original.svg
          python3 - << 'PYEOF'
          import re

          src = "dist/snake-original.svg"
          dst = "dist/github-contribution-grid-snake-dark.svg"

          with open(src, "r", encoding="utf-8") as f:
              content = f.read()

          content = re.sub(r'viewBox="-16 -32 880 192"', 'viewBox="-16 0 880 160"', content)
          content = re.sub(r'height="192"', 'height="160"', content)

          with open(dst, "w", encoding="utf-8") as f:
              f.write(content)

          print("Done! Invisible top row removed.")
          PYEOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

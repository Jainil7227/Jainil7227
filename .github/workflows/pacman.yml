name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix viewBox — remove invisible top row
        run: |
          # Read original, fix, write to /tmp, then overwrite using tee
          cat dist/github-contribution-grid-snake-dark.svg \
            | sed 's/viewBox="-16 -32 880 192"/viewBox="-16 0 880 160"/g' \
            | sed 's/height="192"/height="160"/g' \
            | tee /tmp/snake-fixed.svg > /dev/null
          cat /tmp/snake-fixed.svg | tee dist/github-contribution-grid-snake-dark.svg > /dev/null
          echo "Done! viewBox fixed."

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

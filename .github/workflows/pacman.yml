name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            output/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add clipPath to keep snake inside grid
        run: |
          mkdir -p dist
          python3 << 'PYEOF'
          with open("output/github-contribution-grid-snake-dark.svg", "r") as f:
              svg = f.read()

          # The grid starts at y=2 and ends at y=110 (7 rows * 16px - 2px)
          # x starts at -16 (viewBox x) width=880
          # Insert a clipPath def + wrap snake elements in a g with clip-path
          clip_def = '<defs><clipPath id="grid-clip"><rect x="-16" y="0" width="880" height="114"/></clipPath></defs>'

          # Insert defs right after <svg ...>
          svg = svg.replace('<desc>', clip_def + '<desc>', 1)

          # Wrap all snake elements (class "s") in a clipped group
          # Find where snake rects start - they have class="s s0" etc
          # Add clip-path to each snake rect
          svg = svg.replace('class="s ', 'clip-path="url(#grid-clip)" class="s ')

          with open("dist/github-contribution-grid-snake-dark.svg", "w") as f:
              f.write(svg)

          print("Done! clipPath added.")
          PYEOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

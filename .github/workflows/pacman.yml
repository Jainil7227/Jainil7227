name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=purple
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix viewBox — remove invisible top row
        run: |
          python3 << 'PYEOF'
          import re

          path = "dist/github-contribution-grid-snake-dark.svg"
          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          # The viewBox is "-16 -32 880 192"
          # -32 y means snake travels 32px ABOVE the visible grid
          # Fix: set y to 0, reduce height by 32 to crop that invisible top row
          # Also fix the u (progress bar) rects which are at y=144 — move them to y=112
          
          # Fix viewBox: change y from -32 to 0, height from 192 to 160
          content = re.sub(
              r'viewBox="-16 -32 880 192"',
              'viewBox="-16 0 880 160"',
              content
          )
          # Fix height attribute on svg tag
          content = re.sub(
              r'<svg viewBox="-16 0 880 160" width="880" height="192"',
              '<svg viewBox="-16 0 880 160" width="880" height="160"',
              content
          )

          with open(path, "w", encoding="utf-8") as f:
              f.write(content)

          print("Done! Cropped 32px from top — invisible row removed.")
          PYEOF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
